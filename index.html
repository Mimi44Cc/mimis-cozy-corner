<!DOCTYPE html>

<html>
<head>

<title>Mimi's Cozy Corner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#020617;
color:#F9FAFB;
text-align:center;
overflow-x:hidden;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(12px);
padding:15px;
z-index:10;
}

nav a{
color:white;
text-decoration:none;
margin:20px;
font-weight:600;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at 20% 40%,#FF2E88,transparent 45%),
radial-gradient(circle at 70% 60%,#8B5CF6,transparent 45%),
radial-gradient(circle at 50% 80%,#6366F1,transparent 45%),
radial-gradient(circle at 40% 20%,#22D3EE,transparent 45%),
#020617;
}

.hero h1{
font-size:60px;
background:linear-gradient(90deg,#FF2E88,#8B5CF6,#22D3EE);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
font-size:22px;
opacity:.9;
}

/* BUTTON */

.neon-btn{
margin-top:20px;
padding:14px 28px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:linear-gradient(90deg,#FF2E88,#8B5CF6,#22D3EE);
color:white;
}

.neon-btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px #8B5CF6;
}

/* SECTIONS */

.section{
padding:90px 20px;
}

/* STORE GRID */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:1100px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.06);
padding:25px;
border-radius:14px;
}

.card img{
width:100%;
border-radius:10px;
}

/* DESIGNER */

.shirt-preview{
position:relative;
width:320px;
margin:auto;
}

.shirt-preview img{
width:100%;
}

#design-text{
position:absolute;
top:120px;
left:0;
right:0;
font-size:26px;
font-weight:bold;
}

#design-image{
position:absolute;
top:100px;
left:50%;
transform:translateX(-50%);
max-width:120px;
}

/* INPUTS */

input,select{
width:230px;
padding:10px;
margin:8px;
border-radius:8px;
border:none;
}

footer{
padding:40px;
opacity:.7;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#shop">Shop</a>
<a href="#design">Design</a>
</nav>

<section class="hero">

<h1>Mimi's Cozy Corner</h1>
<p>Bold Neon T-Shirts for Creative Souls</p>

<button class="neon-btn">Shop T-Shirts</button> <button class="neon-btn">Design Your Own</button>

</section>

<section class="section" id="shop">

<h2>Featured T-Shirts</h2>

<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h3>Neon Dream Tee</h3>
<p>$24.99</p>
<button class="neon-btn">Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
<h3>Cosmic Vibes Tee</h3>
<p>$24.99</p>
<button class="neon-btn">Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1489987707025-afc232f7ea0f">
<h3>Midnight Glow Tee</h3>
<p>$24.99</p>
<button class="neon-btn">Buy Now</button>
</div>

</div>

</section>

<section class="section" id="design">

<h2>Design Your Own T-Shirt</h2>

<div class="shirt-preview" id="designer">

<img id="shirt" src="https://i.imgur.com/6qK0F8K.png">

<div id="design-text"></div>

<img id="design-image">

</div>

<input type="text" id="textInput" placeholder="Enter text">

<br>

<label>Text Color</label><br> <input type="color" id="textColor">

<br>

<label>Shirt Color</label><br>

<select id="shirtColor">
<option value="#000000">Black</option>
<option value="#ffffff">White</option>
<option value="#ff0000">Red</option>
<option value="#1e3a8a">Blue</option>
<option value="#065f46">Green</option>
<option value="#facc15">Yellow</option>
</select>

<br>

<input type="file" id="imageUpload">

<br>

<label>Rotate Design</label><br> <input type="range" id="rotateSlider" min="0" max="360">

<br>

<button class="neon-btn" id="resetBtn">Reset Design</button> <button class="neon-btn" id="downloadBtn">Download My Design</button>

</section>

<footer>
<p>© Mimi's Cozy Corner</p>
</footer>

<script>

/* TEXT */

const textInput=document.getElementById("textInput");
const designText=document.getElementById("design-text");

textInput.addEventListener("input",()=>{
designText.textContent=textInput.value;
});

/* TEXT COLOR */

const textColor=document.getElementById("textColor");

textColor.addEventListener("input",()=>{
designText.style.color=textColor.value;
});

/* SHIRT COLOR */

const shirtColor=document.getElementById("shirtColor");
const shirt=document.getElementById("shirt");

shirtColor.addEventListener("change",()=>{
shirt.style.backgroundColor=shirtColor.value;
});

/* IMAGE UPLOAD */

const imageUpload=document.getElementById("imageUpload");
const designImage=document.getElementById("design-image");

imageUpload.addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){
designImage.src=e.target.result;
};

reader.readAsDataURL(file);

}

});

/* DRAGGING */

interact('#design-text').draggable({
listeners:{
move(event){

const target=event.target;

const x=(parseFloat(target.getAttribute('data-x'))||0)+event.dx;
const y=(parseFloat(target.getAttribute('data-y'))||0)+event.dy;

target.style.transform='translate('+x+'px,'+y+'px)';

target.setAttribute('data-x',x);
target.setAttribute('data-y',y);

}
}
});

interact('#design-image').draggable({
listeners:{
move(event){

const target=event.target;

const x=(parseFloat(target.getAttribute('data-x'))||0)+event.dx;
const y=(parseFloat(target.getAttribute('data-y'))||0)+event.dy;

target.style.transform='translate('+x+'px,'+y+'px)';

target.setAttribute('data-x',x);
target.setAttribute('data-y',y);

}
}
});

/* RESIZE */

interact('#design-image').resizable({
edges:{left:true,right:true,bottom:true,top:true},
listeners:{
move(event){

let target=event.target;
target.style.width=event.rect.width+'px';

}
}
});

/* ROTATE */

const rotateSlider=document.getElementById("rotateSlider");

rotateSlider.addEventListener("input",()=>{
designImage.style.transform="translateX(-50%) rotate("+rotateSlider.value+"deg)";
});

/* RESET */

document.getElementById("resetBtn").onclick=function(){

designText.textContent="";
designImage.src="";
rotateSlider.value=0;

};

/* DOWNLOAD */

document.getElementById("downloadBtn").onclick=function(){

html2canvas(document.getElementById("designer")).then(canvas=>{

const link=document.createElement("a");

link.download="my-shirt-design.png";

link.href=canvas.toDataURL();

link.click();

});

};

</script>

</body>
</html>
