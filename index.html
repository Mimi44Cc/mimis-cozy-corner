<!DOCTYPE html>
<html>
<head>

<title>Mimi's Cozy Corner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#020617;
color:#F9FAFB;
text-align:center;
overflow-x:hidden;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(12px);
padding:15px;
z-index:10;
}

nav a{
color:white;
text-decoration:none;
margin:20px;
font-weight:600;
}

/* HERO */

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at 20% 40%,#FF2E88,transparent 45%),
radial-gradient(circle at 70% 60%,#8B5CF6,transparent 45%),
radial-gradient(circle at 50% 80%,#6366F1,transparent 45%),
radial-gradient(circle at 40% 20%,#22D3EE,transparent 45%),
#020617;
}

/* FLOATING ORBS */

.orb{
position:absolute;
border-radius:50%;
filter:blur(80px);
opacity:0.7;
}

.orb1{
width:300px;
height:300px;
background:#FF2E88;
top:10%;
left:10%;
}

.orb2{
width:350px;
height:350px;
background:#8B5CF6;
bottom:10%;
right:15%;
}

.orb3{
width:280px;
height:280px;
background:#22D3EE;
top:40%;
right:40%;
}

/* HERO TEXT */

.hero h1{
font-size:60px;
margin:0;
background:linear-gradient(90deg,#FF2E88,#8B5CF6,#22D3EE);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* BUTTON */

.neon-btn{
margin-top:20px;
padding:14px 28px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:linear-gradient(90deg,#FF2E88,#8B5CF6,#22D3EE);
color:white;
}

.neon-btn:hover{
transform:scale(1.05);
box-shadow:0 0 15px #FF2E88,0 0 30px #8B5CF6,0 0 45px #22D3EE;
}

/* SECTIONS */

.section{
padding:90px 20px;
}

/* PRODUCT GRID */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:1100px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.06);
padding:25px;
border-radius:14px;
}

.card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

/* SHIRT DESIGNER */

.shirt-preview{
position:relative;
width:300px;
margin:auto;
}

.shirt-preview img{
width:100%;
}

#design-text{
position:absolute;
top:120px;
left:0;
right:0;
text-align:center;
font-size:24px;
font-weight:bold;
}

#design-image{
position:absolute;
top:100px;
left:50%;
transform:translateX(-50%);
max-width:120px;
}

/* FORM */

input,textarea{
width:80%;
max-width:400px;
padding:10px;
margin:10px;
border-radius:8px;
border:none;
}

footer{
padding:40px;
opacity:.7;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Design</a>
<a href="#">Contact</a>
</nav>

<section class="hero">

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<h1>Mimi's Cozy Corner</h1>
<p>Bold Neon T-Shirts for Creative Souls</p>

<button class="neon-btn">Shop T-Shirts</button>
<button class="neon-btn">Design Your Own</button>

</section>

<section class="section">

<h2>Featured T-Shirts</h2>

<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h3>Neon Dream Tee</h3>
<p>$24.99</p>
<button class="neon-btn">Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
<h3>Cosmic Vibes Tee</h3>
<p>$24.99</p>
<button class="neon-btn">Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1489987707025-afc232f7ea0f">
<h3>Midnight Glow Tee</h3>
<p>$24.99</p>
<button class="neon-btn">Buy Now</button>
</div>

</div>

</section>

<section class="section">

<h2>Design Your Own T-Shirt</h2>

<div class="shirt-preview">

<img src="https://i.imgur.com/6qK0F8K.png">

<div id="design-text"></div>

<img id="design-image">

</div>

<input type="text" id="textInput" placeholder="Enter your text">

<br>

<input type="color" id="textColor">

<br>

<input type="file" id="imageUpload">

<br>

<button class="neon-btn">Add To Order</button>

</section>

<footer>

<p>© Mimi's Cozy Corner</p>

</footer>

<script>

/* TEXT DESIGN */

const textInput = document.getElementById("textInput");
const designText = document.getElementById("design-text");
const textColor = document.getElementById("textColor");
const imageUpload = document.getElementById("imageUpload");
const designImage = document.getElementById("design-image");

textInput.addEventListener("input",()=>{
designText.textContent=textInput.value;
});

textColor.addEventListener("input",()=>{
designText.style.color=textColor.value;
});

/* IMAGE UPLOAD */

imageUpload.addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

designImage.src=e.target.result;

};

reader.readAsDataURL(file);

}

});

/* DRAG TEXT */

interact('#design-text').draggable({

listeners:{

move(event){

const target=event.target;

const x=(parseFloat(target.getAttribute('data-x'))||0)+event.dx;
const y=(parseFloat(target.getAttribute('data-y'))||0)+event.dy;

target.style.transform='translate('+x+'px,'+y+'px)';

target.setAttribute('data-x',x);
target.setAttribute('data-y',y);

}

}

});

/* DRAG IMAGE */

interact('#design-image').draggable({

listeners:{

move(event){

const target=event.target;

const x=(parseFloat(target.getAttribute('data-x'))||0)+event.dx;
const y=(parseFloat(target.getAttribute('data-y'))||0)+event.dy;

target.style.transform='translate('+x+'px,'+y+'px)';

target.setAttribute('data-x',x);
target.setAttribute('data-y',y);

}

}

});

/* RESIZE IMAGE */

interact('#design-image').resizable({

edges:{left:true,right:true,bottom:true,top:true},

listeners:{

move(event){

let target=event.target;

let x=(parseFloat(target.getAttribute('data-x'))||0);
let y=(parseFloat(target.getAttribute('data-y'))||0);

target.style.width=event.rect.width+'px';
target.style.height=event.rect.height+'px';

x+=event.deltaRect.left;
y+=event.deltaRect.top;

target.style.transform='translate('+x+'px,'+y+'px)';

target.setAttribute('data-x',x);
target.setAttribute('data-y',y);

}

}

});

</script>

</body>
</html>
