<!DOCTYPE html>

<html>
<head>

<title>Mimi's Cozy Corner</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#020617;
color:#F9FAFB;
text-align:center;
overflow-x:hidden;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(12px);
padding:15px;
z-index:10;
}

nav a{
color:white;
margin:20px;
text-decoration:none;
font-weight:600;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at 20% 40%,#FF2E88,transparent 45%),
radial-gradient(circle at 70% 60%,#8B5CF6,transparent 45%),
radial-gradient(circle at 50% 80%,#6366F1,transparent 45%),
radial-gradient(circle at 40% 20%,#22D3EE,transparent 45%);
}

.hero h1{
font-size:60px;
background:linear-gradient(90deg,#FF2E88,#8B5CF6,#22D3EE);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
font-size:22px;
opacity:.9;
}

/* BUTTON */

.neon-btn{
padding:14px 28px;
margin:10px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:linear-gradient(90deg,#FF2E88,#8B5CF6,#22D3EE);
color:white;
}

/* SECTIONS */

.section{
padding:90px 20px;
}

/* STORE */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:1100px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.06);
padding:20px;
border-radius:12px;
}

.card img{
width:100%;
border-radius:10px;
}

/* DESIGNER */

.shirt-preview{
position:relative;
width:320px;
margin:auto;
}

.shirt-preview img{
width:100%;
}

#design-text{
position:absolute;
top:120px;
left:0;
right:0;
font-size:26px;
font-weight:bold;
}

#design-image{
position:absolute;
top:100px;
left:50%;
transform:translateX(-50%);
max-width:120px;
}

/* GENERATOR BOX */

.generator{
max-width:600px;
margin:auto;
background:rgba(255,255,255,.05);
padding:30px;
border-radius:12px;
}

input,select{
padding:10px;
margin:8px;
border-radius:8px;
border:none;
}

footer{
padding:40px;
opacity:.7;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#shop">Shop</a>
<a href="#design">Designer</a>
<a href="#ideas">Ideas</a>
</nav>

<section class="hero">

<h1>Mimi's Cozy Corner</h1>

<p>Bold Neon T-Shirts for Creative Souls</p>

<button class="neon-btn">Shop Now</button>

</section>

<section class="section" id="shop">

<h2>Featured Shirts</h2>

<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h3>Neon Dream Tee</h3>
<p>$24.99</p>
<button class="neon-btn">Buy</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
<h3>Cosmic Vibes Tee</h3>
<p>$24.99</p>
<button class="neon-btn">Buy</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1489987707025-afc232f7ea0f">
<h3>Midnight Glow Tee</h3>
<p>$24.99</p>
<button class="neon-btn">Buy</button>
</div>

</div>

</section>

<section class="section" id="design">

<h2>Design Your Shirt</h2>

<div class="shirt-preview" id="designer">

<img id="shirt" src="https://i.imgur.com/6qK0F8K.png">

<div id="design-text"></div>

<img id="design-image">

</div>

<input type="text" id="textInput" placeholder="Enter text">

<br>

<label>Text Color</label><br>

<input type="color" id="textColor">

<br>

<label>Shirt Color</label><br>

<select id="shirtColor">

<option value="#000000">Black</option>

<option value="#ffffff">White</option>

<option value="#ff0000">Red</option>

<option value="#1e3a8a">Blue</option>

</select>

<br>

<input type="file" id="imageUpload">

<br>

<label>Rotate Design</label><br>

<input type="range" id="rotateSlider" min="0" max="360">

<br>

<button class="neon-btn" id="downloadBtn">Download Design</button>

</section>

<section class="section" id="ideas">

<h2>Viral Shirt Idea Generator</h2>

<div class="generator">

<button class="neon-btn" onclick="idea()">Generate Idea</button>

<p id="idea"></p>

<button class="neon-btn" onclick="slogan()">Generate Slogan</button>

<p id="slogan"></p>

<button class="neon-btn" onclick="caption()">Generate Caption</button>

<p id="caption"></p>

<button class="neon-btn" onclick="hashtags()">Generate Hashtags</button>

<p id="hashtags"></p>

</div>

</section>

<footer>

<p>© Mimi's Cozy Corner</p>

</footer>

<script>

/* TEXT */

const textInput=document.getElementById("textInput");

const designText=document.getElementById("design-text");

textInput.addEventListener("input",()=>{

designText.textContent=textInput.value;

});

/* TEXT COLOR */

document.getElementById("textColor").addEventListener("input",e=>{

designText.style.color=e.target.value;

});

/* IMAGE UPLOAD */

const imageUpload=document.getElementById("imageUpload");

const designImage=document.getElementById("design-image");

imageUpload.addEventListener("change",function(){

const file=this.files[0];

const reader=new FileReader();

reader.onload=e=>{

designImage.src=e.target.result;

};

reader.readAsDataURL(file);

});

/* DRAG */

interact('#design-text').draggable({

listeners:{move(event){

const target=event.target;

const x=(parseFloat(target.getAttribute('data-x'))||0)+event.dx;

const y=(parseFloat(target.getAttribute('data-y'))||0)+event.dy;

target.style.transform='translate('+x+'px,'+y+'px)';

target.setAttribute('data-x',x);

target.setAttribute('data-y',y);

}}

});

/* DOWNLOAD */

document.getElementById("downloadBtn").onclick=function(){

html2canvas(document.getElementById("designer")).then(canvas=>{

const link=document.createElement("a");

link.download="shirt-design.png";

link.href=canvas.toDataURL();

link.click();

});

};

/* GENERATORS */

function idea(){

const ideas=[

"Funny coffee addict shirt",

"Retro neon sunset graphic",

"Motivational hustle quote",

"Gaming meme shirt",

"Minimalist streetwear design"

];

document.getElementById("idea").innerText=ideas[Math.floor(Math.random()*ideas.length)];

}

function slogan(){

const slogans=[

"Stay Cozy Stay Bold",

"Glow Different",

"Create Your Own Reality",

"Too Cozy To Care"

];

document.getElementById("slogan").innerText=slogans[Math.floor(Math.random()*slogans.length)];

}

function caption(){

const captions=[

"Fresh neon drip just dropped 🔥",

"Design your own vibe today",

"Streetwear meets creativity"

];

document.getElementById("caption").innerText=captions[Math.floor(Math.random()*captions.length)];

}

function hashtags(){

const tags=[

"#customshirts #streetwear #tshirtdesign",

"#neonstyle #customfashion #viralshirt"

];

document.getElementById("hashtags").innerText=tags[Math.floor(Math.random()*tags.length)];

}

</script>

</body>
</html>
