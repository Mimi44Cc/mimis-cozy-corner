<!DOCTYPE html>

<html>
<head>

<title>Mimi's Cozy Corner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#020617;
color:white;
text-align:center;
}

/* NAV */

nav{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,.4);
padding:15px;
z-index:10;
}

nav a{
color:white;
margin:20px;
text-decoration:none;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at 20% 40%,#ff2e88,transparent 40%),
radial-gradient(circle at 70% 60%,#8b5cf6,transparent 40%),
radial-gradient(circle at 50% 80%,#22d3ee,transparent 40%);
}

.hero h1{
font-size:64px;
background:linear-gradient(90deg,#ff2e88,#8b5cf6,#22d3ee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* BUTTON */

.neon-btn{
padding:14px 28px;
margin:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ff2e88,#8b5cf6,#22d3ee);
color:white;
cursor:pointer;
}

/* SECTIONS */

.section{
padding:90px 20px;
}

/* STORE */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:1100px;
margin:auto;
}

.card{
background:rgba(255,255,255,.06);
padding:20px;
border-radius:12px;
}

.card img{
width:100%;
border-radius:10px;
}

/* DESIGNER */

.shirt-preview{
position:relative;
width:300px;
margin:auto;
}

.shirt-preview img{
width:100%;
}

#design-text{
position:absolute;
top:120px;
left:0;
right:0;
font-size:24px;
font-weight:bold;
}

/* GENERATOR BOX */

.generator{
max-width:600px;
margin:auto;
background:rgba(255,255,255,.05);
padding:30px;
border-radius:12px;
}

footer{
padding:40px;
}

</style>

</head>

<body>

<nav>

<a href="#">Home</a> <a href="#store">Store</a> <a href="#designer">Designer</a> <a href="#quotes">Quotes</a> <a href="#ideas">Ideas</a>

</nav>

<section class="hero">

<h1>Mimi's Cozy Corner</h1>

<p>A Universe of Creativity, Designs, and Inspiration</p>

<button class="neon-btn">Explore Designs</button>

</section>

<section class="section" id="store">

<h2>Creative Merch Store</h2>

<div class="cards">

<div class="card">

<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">

<h3>Neon Dream Tee</h3>

<p>$24.99</p>

<button class="neon-btn">Buy</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">

<h3>Cosmic Quote Hoodie</h3>

<p>$39.99</p>

<button class="neon-btn">Buy</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1489987707025-afc232f7ea0f">

<h3>Creative Mind Poster</h3>

<p>$14.99</p>

<button class="neon-btn">Buy</button>

</div>

</div>

</section>

<section class="section" id="designer">

<h2>Create Your Own Design</h2>

<div class="shirt-preview">

<img src="https://i.imgur.com/6qK0F8K.png">

<div id="design-text"></div>

</div>

<input type="text" id="textInput" placeholder="Type your quote or design">

<button class="neon-btn" onclick="updateDesign()">Apply</button>

</section>

<section class="section" id="quotes">

<h2>Quote Generator</h2>

<div class="generator">

<button class="neon-btn" onclick="quote()">Generate Quote</button>

<p id="quote"></p>

</div>

</section>

<section class="section" id="ideas">

<h2>Creative Idea Generator</h2>

<div class="generator">

<button class="neon-btn" onclick="idea()">Generate Idea</button>

<p id="idea"></p>

</div>

</section>

<footer>

<p>© Mimi's Cozy Corner</p>

</footer>

<script>

function updateDesign(){

const text=document.getElementById("textInput").value;

document.getElementById("design-text").innerText=text;

}

function quote(){

const quotes=[

"Dream bigger than yesterday",

"Your creativity is your power",

"Make the world colorful",

"Stay cozy stay bold",

"Art is freedom"

];

document.getElementById("quote").innerText=quotes[Math.floor(Math.random()*quotes.length)];

}

function idea(){

const ideas=[

"Retro neon motivational design",

"Funny cat meme shirt",

"Positive affirmation poster",

"Streetwear graffiti hoodie",

"Minimalist quote design"

];

document.getElementById("idea").innerText=ideas[Math.floor(Math.random()*ideas.length)];

}

</script>

</body>

</html>
