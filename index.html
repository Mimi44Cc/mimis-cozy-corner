<!DOCTYPE html>

<html>
<head>

<title>Mimi's Cozy Corner</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#020617;
color:#F9FAFB;
text-align:center;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,.4);
padding:15px;
z-index:10;
}

nav a{
color:white;
margin:20px;
text-decoration:none;
font-weight:600;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at 20% 40%,#ff2e88,transparent 40%),
radial-gradient(circle at 70% 60%,#8b5cf6,transparent 40%),
radial-gradient(circle at 50% 80%,#22d3ee,transparent 40%);
}

.hero h1{
font-size:64px;
background:linear-gradient(90deg,#ff2e88,#8b5cf6,#22d3ee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* BUTTON */

.neon-btn{
padding:14px 28px;
margin:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ff2e88,#8b5cf6,#22d3ee);
color:white;
cursor:pointer;
}

/* SECTIONS */

.section{
padding:90px 20px;
}

/* STORE */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:1100px;
margin:auto;
}

.card{
background:rgba(255,255,255,.06);
padding:20px;
border-radius:12px;
}

.card img{
width:100%;
border-radius:10px;
}

/* DESIGNER */

.shirt-preview{
position:relative;
width:320px;
margin:auto;
}

.shirt-preview img{
width:100%;
}

#design-text{
position:absolute;
top:120px;
left:0;
right:0;
font-size:26px;
font-weight:bold;
}

/* GENERATORS */

.generator{
max-width:600px;
margin:auto;
background:rgba(255,255,255,.05);
padding:30px;
border-radius:12px;
}

footer{
padding:40px;
opacity:.7;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</head>

<body>

<nav>

<a href="#">Home</a> <a href="#store">Store</a> <a href="#designer">Designer</a> <a href="#humor">Humor</a> <a href="#ideas">Ideas</a>

</nav>

<section class="hero">

<h1>Mimi's Cozy Corner</h1>

<p>A Universe of Designs, Humor & Creativity</p>

<button class="neon-btn">Explore</button>

</section>

<section class="section" id="store">

<h2>Creative Merch Store</h2>

<div class="cards">

<div class="card">

<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">

<h3>Neon Dream Tee</h3>

<p>$24.99</p>

<button class="neon-btn">Buy</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">

<h3>Cosmic Hoodie</h3>

<p>$39.99</p>

<button class="neon-btn">Buy</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1489987707025-afc232f7ea0f">

<h3>Creative Poster</h3>

<p>$14.99</p>

<button class="neon-btn">Buy</button>

</div>

</div>

</section>

<section class="section" id="designer">

<h2>Create Your Design</h2>

<div class="shirt-preview" id="designerCanvas">

<img src="https://i.imgur.com/6qK0F8K.png">

<div id="design-text"></div>

</div>

<input type="text" id="textInput" placeholder="Enter quote or design text">

<button class="neon-btn" onclick="updateDesign()">Apply</button>

<br>

<label>Text Color</label>

<input type="color" id="textColor">

<br>

<button class="neon-btn" id="downloadBtn">Download Design</button>

</section>

<section class="section" id="humor">

<h2>Humor Generators</h2>

<div class="generator">

<button class="neon-btn" onclick="dadJoke()">Dad Joke</button>

<p id="dad"></p>

<button class="neon-btn" onclick="momJoke()">Mom Humor</button>

<p id="mom"></p>

<button class="neon-btn" onclick="sarcasm()">Sarcasm</button>

<p id="sarcasm"></p>

<button class="neon-btn" onclick="kidJoke()">Kid Joke</button>

<p id="kid"></p>

<button class="neon-btn" onclick="adult()">Edgy Humor</button>

<p id="adult"></p>

</div>

</section>

<section class="section" id="ideas">

<h2>Design Idea Generator</h2>

<div class="generator">

<button class="neon-btn" onclick="idea()">Generate Design Idea</button>

<p id="idea"></p>

</div>

</section>

<footer>

<p>© Mimi's Cozy Corner</p>

</footer>

<script>

function updateDesign(){

const text=document.getElementById("textInput").value;

const color=document.getElementById("textColor").value;

const element=document.getElementById("design-text");

element.innerText=text;

element.style.color=color;

}

/* DOWNLOAD DESIGN */

document.getElementById("downloadBtn").onclick=function(){

html2canvas(document.getElementById("designerCanvas")).then(canvas=>{

const link=document.createElement("a");

link.download="design.png";

link.href=canvas.toDataURL();

link.click();

});

};

/* HUMOR */

function dadJoke(){

const jokes=[

"I used to hate facial hair… but it grew on me",

"I'm not sleeping, I'm just charging my dad batteries",

"I only know 25 letters of the alphabet. I don't know Y"

];

document.getElementById("dad").innerText=jokes[Math.floor(Math.random()*jokes.length)];

}

function momJoke(){

const jokes=[

"If it's quiet, something is wrong",

"Mom mode: activated",

"I whisper snacks so the kids can't hear me panic"

];

document.getElementById("mom").innerText=jokes[Math.floor(Math.random()*jokes.length)];

}

function sarcasm(){

const jokes=[

"I'm not arguing I'm explaining why I'm right",

"My patience left the chat",

"Sure I'd love to help… said no one ever"

];

document.getElementById("sarcasm").innerText=jokes[Math.floor(Math.random()*jokes.length)];

}

function kidJoke(){

const jokes=[

"Why did the cookie go to the doctor? Because it felt crummy",

"Why did the computer go to school? To improve its memory"

];

document.getElementById("kid").innerText=jokes[Math.floor(Math.random()*jokes.length)];

}

function adult(){

const jokes=[

"Running late is my cardio",

"Powered by caffeine and poor decisions",

"My brain has too many tabs open"

];

document.getElementById("adult").innerText=jokes[Math.floor(Math.random()*jokes.length)];

}

function idea(){

const ideas=[

"Retro neon motivational quote shirt",

"Funny cat meme design",

"Minimalist affirmation poster",

"Sarcastic office humor tee",

"Streetwear graffiti hoodie"

];

document.getElementById("idea").innerText=ideas[Math.floor(Math.random()*ideas.length)];

}

</script>

</body>
</html>
