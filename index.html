<!DOCTYPE html>
<html>

<head>

<title>Mimi's Cozy Corner</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#020617;
color:white;
text-align:center;
}

nav{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,.7);
padding:15px;
z-index:10;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-weight:600;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at 20% 40%,#ff2e88,transparent 40%),
radial-gradient(circle at 70% 60%,#8b5cf6,transparent 40%),
radial-gradient(circle at 50% 80%,#22d3ee,transparent 40%);
}

.hero h1{
font-size:60px;
background:linear-gradient(90deg,#ff2e88,#8b5cf6,#22d3ee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.section{
padding:90px 20px;
}

.neon-btn{
padding:12px 24px;
margin:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ff2e88,#8b5cf6,#22d3ee);
color:white;
cursor:pointer;
}

.feed-item{
background:rgba(255,255,255,.08);
padding:20px;
margin:20px;
border-radius:10px;
}

.designer{
position:relative;
width:320px;
margin:auto;
}

.designer img{
width:100%;
}

.design-text{
position:absolute;
top:120px;
left:0;
right:0;
font-size:26px;
font-weight:bold;
cursor:move;
}

.design-image{
position:absolute;
top:140px;
left:100px;
width:100px;
cursor:move;
}

</style>

</head>

<body>

<nav>
<a href="#challenge">Challenge</a>
<a href="#feed">Feed</a>
<a href="#tools">Tools</a>
<a href="#designer">Designer</a>
</nav>

<section class="hero">

<h1>Mimi's Cozy Corner</h1>
<p>Create • Share • Print</p>

</section>

<section class="section">

<h2>Email Community</h2>

<input id="email" placeholder="Enter email">

<button class="neon-btn" onclick="subscribe()">Subscribe</button>

<p id="msg"></p>

</section>

<section class="section" id="challenge">

<h2>Daily Challenge</h2>

<button class="neon-btn" onclick="challenge()">Generate Challenge</button>

<p id="challengeText"></p>

</section>

<section class="section" id="feed">

<h2>Inspiration Feed</h2>

<div id="feed"></div>

<button class="neon-btn" onclick="feed()">Load More</button>

</section>

<section class="section" id="tools">

<h2>Creative Generators</h2>

<button class="neon-btn" onclick="quote()">Quote</button>
<p id="quote"></p>

<button class="neon-btn" onclick="dad()">Dad Joke</button>
<p id="dad"></p>

<button class="neon-btn" onclick="sarcasm()">Sarcasm</button>
<p id="sarcasm"></p>

<button class="neon-btn" onclick="adult()">Adult Humor</button>
<p id="adult"></p>

</section>

<section class="section">

<h2>Meme Creator</h2>

<input id="top" placeholder="Top text">
<input id="bottom" placeholder="Bottom text">

<br><br>

<button class="neon-btn" onclick="meme()">Generate Meme</button>

<br><br>

<canvas id="canvas" width="400" height="400"></canvas>

</section>

<section class="section" id="designer">

<h2>Design Your Product</h2>

<div class="designer">

<img id="productBase" src="https://i.imgur.com/6qK0F8K.png">

<div id="designText" class="design-text"></div>
<img id="designImage" class="design-image">

</div>

<br>

<input id="shirtText" placeholder="Add text">
<input type="color" id="color">
<input type="file" id="upload">

<br>

<button class="neon-btn" onclick="apply()">Apply Design</button>

</section>

<footer>

<p>© Mimi's Cozy Corner</p>

</footer>

<script>

/* SUPABASE CONNECTION */

const SUPABASE_URL = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuZnBvbHN3dXB3cXZudGpiamlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNzgzMzIsImV4cCI6MjA4ODg1NDMzMn0.U3zAA8Wzig48_O-OCM0ES6ga7rgFofEYNdEKX8zgD0s ";
const SUPABASE_KEY = "sb_publishable_QbiTkloAXg_W9-abBvSasw_0zLXSfzO";

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

/* EMAIL SUBSCRIBE */

async function subscribe(){

const email = document.getElementById("email").value;

if(!email){
alert("Please enter an email");
return;
}

const { data, error } = await supabaseClient
.from("subscribers")
.insert([{ email: email }]);

if(error){
console.error(error);
document.getElementById("msg").innerText="Database error";
}else{
document.getElementById("msg").innerText="Welcome to Mimi's Cozy Corner!";
document.getElementById("email").value="";
}

}

/* DAILY CHALLENGE */

function challenge(){

const list=[
"Design a sarcastic shirt",
"Create a viral meme",
"Make a neon retro shirt",
"Create a motivational quote design"
];

document.getElementById("challengeText").innerText=
list[Math.floor(Math.random()*list.length)];

}

/* FEED */

const posts=[
"Coffee First People Later",
"Sarcasm Loading",
"Powered by Chaos",
"Running Late Is My Cardio"
];

function feed(){

const f=document.getElementById("feed");

for(let i=0;i<3;i++){

const div=document.createElement("div");

div.className="feed-item";

div.innerText=posts[Math.floor(Math.random()*posts.length)];

f.appendChild(div);

}

}

/* QUOTES */

function quote(){

const q=[
"Stay Cozy Stay Bold",
"Dream Bigger",
"Creativity Wins"
];

document.getElementById("quote").innerText=
q[Math.floor(Math.random()*q.length)];

}

/* HUMOR */

function dad(){
document.getElementById("dad").innerText="I used to hate facial hair but it grew on me";
}

function sarcasm(){
document.getElementById("sarcasm").innerText="I'm not arguing I'm explaining why I'm right";
}

function adult(){
document.getElementById("adult").innerText="Powered by caffeine and chaos";
}

/* MEME */

function meme(){

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const img=new Image();
img.src="https://i.imgflip.com/30b1gx.jpg";

img.onload=function(){

ctx.drawImage(img,0,0,400,400);

ctx.font="30px Impact";
ctx.fillStyle="white";
ctx.strokeStyle="black";
ctx.textAlign="center";

ctx.fillText(document.getElementById("top").value,200,40);
ctx.fillText(document.getElementById("bottom").value,200,380);

};

}

/* DESIGN TEXT */

function apply(){

document.getElementById("designText").innerText=
document.getElementById("shirtText").value;

document.getElementById("designText").style.color=
document.getElementById("color").value;

}

/* IMAGE UPLOAD */

document.getElementById("upload").addEventListener("change",function(e){

const reader=new FileReader();

reader.onload=function(){
document.getElementById("designImage").src=reader.result;
};

reader.readAsDataURL(e.target.files[0]);

});

/* DRAG DESIGN */

interact('.design-text,.design-image').draggable({

listeners:{
move(event){

const target=event.target;

const x=(parseFloat(target.getAttribute('data-x'))||0)+event.dx;
const y=(parseFloat(target.getAttribute('data-y'))||0)+event.dy;

target.style.transform=`translate(${x}px,${y}px)`;

target.setAttribute('data-x',x);
target.setAttribute('data-y',y);

}

}

});

</script>

</body>
</html>
