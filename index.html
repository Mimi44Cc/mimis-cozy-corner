<section class="section" id="marketplace">

<h2>Creator Marketplace</h2>

<input id="designInput" placeholder="Submit your design idea">

<button class="neon-btn" onclick="submitDesign()">Submit Design</button>

<div id="marketplaceList"></div>

</section>

<section class="section" id="competition">

<h2>Design Competition</h2>

<input id="competitionInput" placeholder="Enter a quote or idea">

<button class="neon-btn" onclick="submitCompetition()">Submit Entry</button>

<div id="competitionList"></div>

</section>

<section class="section" id="trending">

<h2>Trending Leaderboard</h2>

<div id="leaderboard"></div>

</section>

<section class="section" id="meme">

<h2>Meme Creator</h2>

<input id="memeTop" placeholder="Top Text">

<input id="memeBottom" placeholder="Bottom Text">

<br><br>

<button class="neon-btn" onclick="createMeme()">Generate Meme</button>

<br><br>

<canvas id="memeCanvas" width="400" height="400"></canvas>

<br>

<button class="neon-btn" onclick="downloadMeme()">Download Meme</button>

</section>

<script>

/* MARKETPLACE */

let marketplace=[];

function submitDesign(){

const text=document.getElementById("designInput").value;

if(text==="") return;

marketplace.push(text);

renderMarketplace();

document.getElementById("designInput").value="";

}

function renderMarketplace(){

const box=document.getElementById("marketplaceList");

box.innerHTML="";

marketplace.forEach(d=>{

const div=document.createElement("div");

div.className="feed-item";

div.innerText=d;

box.appendChild(div);

});

}

/* COMPETITION */

let competition={};

function submitCompetition(){

const text=document.getElementById("competitionInput").value;

if(text==="") return;

competition[text]=0;

renderCompetition();

document.getElementById("competitionInput").value="";

}

function renderCompetition(){

const box=document.getElementById("competitionList");

box.innerHTML="";

Object.keys(competition).forEach(text=>{

const div=document.createElement("div");

div.className="feed-item";

const btn=document.createElement("button");

btn.innerText="👍 Vote";

btn.onclick=function(){

competition[text]++;

updateLeaderboard();

};

div.innerText=text;

div.appendChild(document.createElement("br"));

div.appendChild(btn);

box.appendChild(div);

});

}

/* LEADERBOARD */

function updateLeaderboard(){

const board=document.getElementById("leaderboard");

board.innerHTML="";

Object.keys(competition)

.sort((a,b)=>competition[b]-competition[a])

.slice(0,5)

.forEach(text=>{

const div=document.createElement("div");

div.className="leader";

div.innerText=text+" ⭐ "+competition[text];

board.appendChild(div);

});

}

/* MEME CREATOR */

function createMeme(){

const canvas=document.getElementById("memeCanvas");

const ctx=canvas.getContext("2d");

const img=new Image();

img.src="https://i.imgflip.com/30b1gx.jpg";

img.onload=function(){

ctx.drawImage(img,0,0,400,400);

ctx.font="30px Impact";

ctx.fillStyle="white";

ctx.strokeStyle="black";

ctx.lineWidth=3;

ctx.textAlign="center";

ctx.fillText(document.getElementById("memeTop").value,200,40);

ctx.strokeText(document.getElementById("memeTop").value,200,40);

ctx.fillText(document.getElementById("memeBottom").value,200,380);

ctx.strokeText(document.getElementById("memeBottom").value,200,380);

};

}

function downloadMeme(){

const canvas=document.getElementById("memeCanvas");

const link=document.createElement("a");

link.download="meme.png";

link.href=canvas.toDataURL();

link.click();

}

</script>
