<!DOCTYPE html>

<html>
<head>

<title>Mimi's Cozy Corner</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#020617;
color:white;
text-align:center;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,.45);
padding:15px;
z-index:10;
}

nav a{
color:white;
margin:20px;
text-decoration:none;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at 20% 40%,#ff2e88,transparent 40%),
radial-gradient(circle at 70% 60%,#8b5cf6,transparent 40%),
radial-gradient(circle at 50% 80%,#22d3ee,transparent 40%);
}

.hero h1{
font-size:64px;
background:linear-gradient(90deg,#ff2e88,#8b5cf6,#22d3ee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* BUTTON */

.neon-btn{
padding:14px 28px;
margin:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ff2e88,#8b5cf6,#22d3ee);
color:white;
cursor:pointer;
}

/* SECTIONS */

.section{
padding:90px 20px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:1100px;
margin:auto;
}

.card{
background:rgba(255,255,255,.06);
padding:20px;
border-radius:12px;
}

.card img{
width:100%;
border-radius:10px;
}

/* INFINITE FEED */

.feed{
max-width:800px;
margin:auto;
}

.feed-item{
background:rgba(255,255,255,.07);
padding:20px;
margin:20px;
border-radius:10px;
}

/* PROFILE */

.profile{
max-width:600px;
margin:auto;
background:rgba(255,255,255,.05);
padding:30px;
border-radius:12px;
}

</style>

</head>

<body>

<nav>

<a href="#">Home</a> <a href="#feed">Feed</a> <a href="#quotes">Quotes</a> <a href="#humor">Humor</a> <a href="#store">Store</a> <a href="#profile">Profile</a>

</nav>

<section class="hero">

<h1>Mimi's Cozy Corner</h1>

<p>Designs • Humor • Creativity • Community</p>

<button class="neon-btn" onclick="scrollToFeed()">Explore</button>

</section>

<section class="section" id="feed">

<h2>Inspiration Feed</h2>

<div class="feed" id="feedContainer"></div>

<button class="neon-btn" onclick="loadMore()">Load More</button>

</section>

<section class="section" id="quotes">

<h2>Quote Generator</h2>

<button class="neon-btn" onclick="generateQuote()">Generate Quote</button>

<p id="quote"></p>

<button class="neon-btn" onclick="saveFavorite()">Save Favorite</button>

</section>

<section class="section" id="humor">

<h2>Humor Generator</h2>

<button class="neon-btn" onclick="dad()">Dad Joke</button>

<p id="dad"></p>

<button class="neon-btn" onclick="sarcasm()">Sarcasm</button>

<p id="sarcasm"></p>

<button class="neon-btn" onclick="adult()">Edgy Humor</button>

<p id="adult"></p>

</section>

<section class="section" id="store">

<h2>Creative Merch</h2>

<div class="cards">

<div class="card">

<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">

<h3>Neon Dream Tee</h3>

<p>$24.99</p>

<button class="neon-btn">Buy</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">

<h3>Cosmic Hoodie</h3>

<p>$39.99</p>

<button class="neon-btn">Buy</button>

</div>

</div>

</section>

<section class="section" id="profile">

<h2>Your Profile</h2>

<div class="profile">

<input id="username" placeholder="Enter username">

<button class="neon-btn" onclick="saveProfile()">Save Profile</button>

<h3>Saved Favorites</h3>

<div id="favorites"></div>

</div>

</section>

<footer>

<p>© Mimi's Cozy Corner</p>

</footer>

<script>

/* FEED */

const ideas=[

"Coffee First. People Later",

"Powered by Chaos and Snacks",

"World's Okayest Adult",

"Running Late Is My Cardio",

"Sarcasm Loading..."

];

function loadMore(){

const container=document.getElementById("feedContainer");

for(let i=0;i<3;i++){

const div=document.createElement("div");

div.className="feed-item";

div.innerText=ideas[Math.floor(Math.random()*ideas.length)];

container.appendChild(div);

}

}

/* QUOTES */

function generateQuote(){

const quotes=[

"Stay cozy stay bold",

"Creativity is your superpower",

"Dream bigger than yesterday",

"Your imagination is limitless"

];

document.getElementById("quote").innerText=

quotes[Math.floor(Math.random()*quotes.length)];

}

/* HUMOR */

function dad(){

const jokes=[

"I'm reading a book about anti-gravity. It's impossible to put down",

"I used to hate facial hair… but it grew on me"

];

document.getElementById("dad").innerText=jokes[Math.floor(Math.random()*jokes.length)];

}

function sarcasm(){

const jokes=[

"I'm not arguing I'm explaining why I'm right",

"My patience left the chat"

];

document.getElementById("sarcasm").innerText=jokes[Math.floor(Math.random()*jokes.length)];

}

function adult(){

const jokes=[

"Powered by caffeine and poor decisions",

"Running late is my cardio"

];

document.getElementById("adult").innerText=jokes[Math.floor(Math.random()*jokes.length)];

}

/* PROFILE */

function saveProfile(){

localStorage.setItem("username",document.getElementById("username").value);

}

function saveFavorite(){

const quote=document.getElementById("quote").innerText;

let fav=JSON.parse(localStorage.getItem("favorites")||"[]");

fav.push(quote);

localStorage.setItem("favorites",JSON.stringify(fav));

displayFavorites();

}

function displayFavorites(){

const fav=JSON.parse(localStorage.getItem("favorites")||"[]");

const box=document.getElementById("favorites");

box.innerHTML="";

fav.forEach(q=>{

const div=document.createElement("div");

div.innerText=q;

box.appendChild(div);

});

}

displayFavorites();

</script>

</body>
</html>
