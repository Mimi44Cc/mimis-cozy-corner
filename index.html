<!DOCTYPE html>

<html>
<head>

<title>Mimi's Cozy Corner</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#020617;
color:white;
text-align:center;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,.5);
padding:15px;
z-index:10;
}

nav a{
color:white;
margin:20px;
text-decoration:none;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at 20% 40%,#ff2e88,transparent 40%),
radial-gradient(circle at 70% 60%,#8b5cf6,transparent 40%),
radial-gradient(circle at 50% 80%,#22d3ee,transparent 40%);
}

.hero h1{
font-size:64px;
background:linear-gradient(90deg,#ff2e88,#8b5cf6,#22d3ee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* BUTTON */

.neon-btn{
padding:14px 28px;
margin:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ff2e88,#8b5cf6,#22d3ee);
color:white;
cursor:pointer;
}

/* SECTIONS */

.section{
padding:90px 20px;
}

/* STORE GRID */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:1100px;
margin:auto;
}

.card{
background:rgba(255,255,255,.06);
padding:20px;
border-radius:12px;
}

.card img{
width:100%;
border-radius:10px;
}

/* GENERATOR */

.generator{
max-width:600px;
margin:auto;
background:rgba(255,255,255,.05);
padding:30px;
border-radius:12px;
}

/* COMMUNITY */

.community{
max-width:800px;
margin:auto;
background:rgba(255,255,255,.05);
padding:30px;
border-radius:12px;
}

.post{
background:rgba(255,255,255,.08);
padding:15px;
margin:15px;
border-radius:8px;
}

</style>

</head>

<body>

<nav>

<a href="#">Home</a> <a href="#quotes">Quotes</a> <a href="#memes">Memes</a> <a href="#store">Store</a> <a href="#community">Community</a>

</nav>

<section class="hero">

<h1>Mimi's Cozy Corner</h1>

<p>Creativity • Humor • Designs • Community</p>

<button class="neon-btn">Explore Creativity</button>

</section>

<section class="section" id="quotes">

<h2>Quote Generator</h2>

<div class="generator">

<button class="neon-btn" onclick="quote()">Generate Quote</button>

<p id="quote"></p>

<button class="neon-btn" onclick="shareQuote()">Share Quote</button>

</div>

</section>

<section class="section" id="memes">

<h2>Meme / Viral Saying Generator</h2>

<div class="generator">

<button class="neon-btn" onclick="meme()">Generate Meme Idea</button>

<p id="meme"></p>

</div>

</section>

<section class="section" id="store">

<h2>Creative Merch</h2>

<div class="cards">

<div class="card">

<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">

<h3>Neon Dream Tee</h3>

<p>$24.99</p>

<button class="neon-btn">Buy</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">

<h3>Cosmic Hoodie</h3>

<p>$39.99</p>

<button class="neon-btn">Buy</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1489987707025-afc232f7ea0f">

<h3>Creative Poster</h3>

<p>$14.99</p>

<button class="neon-btn">Buy</button>

</div>

</div>

</section>

<section class="section" id="community">

<h2>Community Design Feed</h2>

<div class="community">

<input type="text" id="userPost" placeholder="Share a quote, joke, or design idea">

<br>

<button class="neon-btn" onclick="post()">Submit</button>

<div id="feed"></div>

</div>

</section>

<footer>

<p>© Mimi's Cozy Corner</p>

</footer>

<script>

/* QUOTES */

function quote(){

const quotes=[

"Dream bigger than yesterday",

"Your creativity is your superpower",

"Stay cozy stay bold",

"Create something amazing today",

"Art is freedom"

];

document.getElementById("quote").innerText=quotes[Math.floor(Math.random()*quotes.length)];

}

/* SHARE */

function shareQuote(){

const text=document.getElementById("quote").innerText;

navigator.clipboard.writeText(text);

alert("Quote copied! Share it on social media.");

}

/* MEMES */

function meme(){

const memes=[

"Powered by coffee and chaos",

"Running late is my cardio",

"My brain has too many tabs open",

"Sarcasm loading… please wait",

"World's okayest adult"

];

document.getElementById("meme").innerText=memes[Math.floor(Math.random()*memes.length)];

}

/* COMMUNITY POSTS */

function post(){

const text=document.getElementById("userPost").value;

if(text==="") return;

const div=document.createElement("div");

div.className="post";

div.innerText=text;

document.getElementById("feed").prepend(div);

document.getElementById("userPost").value="";

}

</script>

</body>

</html>
